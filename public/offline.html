<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookVerse — Offline Library</title>
  <link rel="icon" href="/bookverse.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#09090b" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa; --bg-card: #ffffff; --bg-muted: #f4f4f5;
      --border: #e4e4e7; --border-subtle: #f4f4f5;
      --text: #18181b; --text-muted: #a1a1aa; --text-subtle: #71717a;
      --accent: #18181b; --accent-text: #ffffff;
      --amber: #f59e0b; --red: #ef4444; --emerald: #10b981;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b; --bg-card: #09090b; --bg-muted: #18181b;
        --border: #27272a; --border-subtle: #18181b;
        --text: #fafafa; --text-muted: #71717a; --text-subtle: #a1a1aa;
        --accent: #ffffff; --accent-text: #09090b;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 56rem; margin: 0 auto; padding: 3rem 1.5rem 8rem; }

    /* Offline banner */
    .offline-banner {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; margin-bottom: 1.5rem;
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 0.375rem;
      font-size: 0.75rem; font-weight: 700; color: #92400e;
    }
    @media (prefers-color-scheme: dark) {
      .offline-banner { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); color: #fbbf24; }
    }

    .offline-banner svg { flex-shrink: 0; width: 1rem; height: 1rem; }

    /* Header */
    .header { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-subtle); }
    .header-label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 0.75rem;
    }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 0.375rem; }
    .header p { font-size: 0.75rem; color: var(--text-subtle); max-width: 28rem; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6rem 1.5rem; text-align: center;
    }
    .empty-state svg { width: 3rem; height: 3rem; color: var(--border); margin-bottom: 1.5rem; }
    .empty-state h2 { font-size: 0.875rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.75rem; color: var(--text-muted); max-width: 20rem; }

    /* Story grid */
    .story-grid {
      display: grid; grid-template-columns: repeat(1, 1fr); gap: 1rem;
    }
    @media (min-width: 640px) { .story-grid { grid-template-columns: repeat(2, 1fr); } }

    .story-card {
      border: 1px solid var(--border); border-radius: 0.375rem;
      background: var(--bg-card); overflow: hidden;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .story-card:hover { border-color: var(--text-muted); }

    .story-card-inner { display: flex; gap: 1rem; padding: 1rem; }

    .story-cover {
      flex-shrink: 0; width: 5rem; height: 7rem; border-radius: 0.375rem;
      overflow: hidden; background: var(--bg-muted);
      display: flex; align-items: center; justify-content: center;
    }
    .story-cover img { width: 100%; height: 100%; object-fit: cover; }
    .story-cover svg { width: 1.5rem; height: 1.5rem; color: var(--border); }

    .story-info { flex: 1; min-width: 0; }
    .story-title {
      font-size: 0.875rem; font-weight: 700; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .story-author {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 0.375rem;
    }
    .story-desc {
      font-size: 0.6875rem; color: var(--text-subtle); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .story-meta {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.5625rem; font-weight: 700; font-family: monospace;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
    }
    .story-meta .expiry { color: var(--amber); }

    .story-actions {
      display: flex; border-top: 1px solid var(--border-subtle);
    }
    .story-actions button {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.625rem 1rem; border: none; background: none; cursor: pointer;
      font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-subtle);
      transition: background 0.15s;
    }
    .story-actions button:hover { background: var(--bg-muted); }
    .story-actions button svg { width: 0.75rem; height: 0.75rem; }

    /* Reader view */
    .reader-overlay {
      position: fixed; inset: 0; z-index: 100; background: var(--bg);
      overflow-y: auto; display: none;
    }
    .reader-overlay.open { display: block; }
    .reader-container { max-width: 42rem; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    .reader-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-subtle);
    }
    .reader-back {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
      background: none; border: none; cursor: pointer;
      transition: color 0.15s;
    }
    .reader-back:hover { color: var(--text); }
    .reader-back svg { width: 0.75rem; height: 0.75rem; }

    .reader-chapter-label {
      font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.2em; color: var(--text-muted); font-family: monospace;
    }

    .reader-title {
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
    }
    .reader-subtitle {
      font-size: 0.6875rem; font-weight: 600; color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .reader-content {
      font-size: 1rem; line-height: 1.85; color: var(--text-subtle);
    }
    .reader-content p { margin-bottom: 1.25em; }
    .reader-content h1, .reader-content h2, .reader-content h3 {
      color: var(--text); font-weight: 700; margin-top: 2em; margin-bottom: 0.75em;
    }
    .reader-content img { max-width: 100%; height: auto; border-radius: 0.375rem; margin: 1.5em 0; }
    .reader-content blockquote {
      border-left: 3px solid var(--border); padding-left: 1rem;
      color: var(--text-muted); font-style: italic; margin: 1.5em 0;
    }

    .reader-pagination {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);
    }
    .reader-pagination button {
      padding: 0.625rem 1.25rem; border-radius: 0.375rem;
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
    }
    .reader-pagination button:hover:not(:disabled) { background: var(--bg-muted); }
    .reader-pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .reader-pagination .page-info {
      font-size: 0.5625rem; font-weight: 700; font-family: monospace;
      text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted);
    }

    /* Online reconnected toast */
    .online-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      padding: 0.75rem 1.5rem; border-radius: 2rem;
      background: var(--accent); color: var(--accent-text);
      font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; z-index: 200;
      display: none; animation: slideUp 0.3s ease;
    }
    .online-toast.show { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(1rem); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div class="container" id="app">
    <!-- Offline banner -->
    <div class="offline-banner" id="offline-banner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 12.86a10 10 0 0 1 5.17-2.9"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
      <span>আপনি অফলাইনে আছেন — শুধুমাত্র সেভ করা গল্পগুলো পড়তে পারবেন।</span>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 12.86a10 10 0 0 1 5.17-2.9"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
        Offline Library
      </div>
      <h1>অফলাইন গল্পসমূহ</h1>
      <p>ইন্টারনেট ছাড়াই পড়ুন। আপনার সেভ করা গল্পগুলো এখানে দেখুন।</p>
    </div>

    <!-- Content area -->
    <div id="stories-container">
      <div class="empty-state" id="loading-state">
        <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">Loading saved stories...</p>
      </div>
    </div>
  </div>

  <!-- Reader overlay -->
  <div class="reader-overlay" id="reader-overlay">
    <div class="reader-container">
      <div class="reader-nav">
        <button class="reader-back" id="reader-close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          Back to Library
        </button>
        <span class="reader-chapter-label" id="reader-chapter-label"></span>
      </div>
      <h1 class="reader-title" id="reader-title"></h1>
      <p class="reader-subtitle" id="reader-subtitle"></p>
      <div class="reader-content" id="reader-content"></div>
      <div class="reader-pagination">
        <button id="prev-chapter">← Previous</button>
        <span class="page-info" id="page-info"></span>
        <button id="next-chapter">Next →</button>
      </div>
    </div>
  </div>

  <!-- Online reconnected toast -->
  <div class="online-toast" id="online-toast">✓ Back online — <a href="/" style="color: inherit; text-decoration: underline;">go to BookVerse</a></div>

  <script>
    // ========================
    // IndexedDB Reader (mirrors src/lib/offline-storage.ts)
    // ========================
    const DB_NAME = "bookverse_offline";
    const DB_VERSION = 1;
    const STORE_NAME = "offline_stories";

    function openDB() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) { reject(new Error("IndexedDB unavailable")); return; }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: "id" });
            store.createIndex("expiresAt", "expiresAt", { unique: false });
            store.createIndex("savedAt", "savedAt", { unique: false });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function getAllOfflineStories() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => {
          const now = Date.now();
          resolve((req.result || []).filter(s => s.expiresAt > now).sort((a, b) => b.savedAt - a.savedAt));
        };
        req.onerror = () => reject(req.error);
      });
    }

    function getExpirationLabel(expiresAt) {
      const remaining = expiresAt - Date.now();
      if (remaining <= 0) return "Expired";
      const days = Math.floor(remaining / 86400000);
      const hours = Math.floor((remaining % 86400000) / 3600000);
      if (days > 0) return days + "d " + hours + "h left";
      if (hours > 0) return hours + "h left";
      return "Soon";
    }

    // ========================
    // Rendering
    // ========================
    let currentStory = null;
    let currentChapterIndex = 0;

    async function renderStories() {
      const container = document.getElementById("stories-container");
      try {
        const stories = await getAllOfflineStories();

        if (stories.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 12.86a10 10 0 0 1 5.17-2.9"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
              <h2>কোনো অফলাইন গল্প নেই</h2>
              <p>ইন্টারনেট সংযোগ থাকা অবস্থায় গল্পের পৃষ্ঠায় গিয়ে "Save Offline" বাটনে ক্লিক করে গল্প ডাউনলোড করুন।</p>
            </div>`;
          return;
        }

        let html = '<div class="story-grid">';
        stories.forEach((story, i) => {
          const coverHtml = story.coverImage
            ? `<img src="${story.coverImage}" alt="" />`
            : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`;

          html += `
            <div class="story-card" data-index="${i}">
              <div class="story-card-inner">
                <div class="story-cover">${coverHtml}</div>
                <div class="story-info">
                  <div class="story-title">${escapeHtml(story.title)}</div>
                  <div class="story-author">${escapeHtml(story.author)}</div>
                  ${story.description ? `<div class="story-desc">${escapeHtml(story.description)}</div>` : ""}
                  <div class="story-meta">
                    <span>📖 ${story.chapters.length} Ch</span>
                    <span class="expiry">⏱ ${getExpirationLabel(story.expiresAt)}</span>
                  </div>
                </div>
              </div>
              <div class="story-actions">
                <button onclick="openReader(${i})">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                  Read Offline
                </button>
              </div>
            </div>`;
        });
        html += "</div>";
        container.innerHTML = html;

        // Store reference for reader
        window.__offlineStories = stories;
      } catch (err) {
        console.error("Error loading offline stories:", err);
        container.innerHTML = `
          <div class="empty-state">
            <h2>Failed to load stories</h2>
            <p>There was an error accessing your offline library.</p>
          </div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ========================
    // Reader
    // ========================
    function openReader(storyIndex) {
      const stories = window.__offlineStories;
      if (!stories || !stories[storyIndex]) return;

      currentStory = stories[storyIndex];
      currentChapterIndex = 0;
      renderChapter();
      document.getElementById("reader-overlay").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function renderChapter() {
      if (!currentStory || !currentStory.chapters[currentChapterIndex]) return;

      const chapter = currentStory.chapters[currentChapterIndex];
      const total = currentStory.chapters.length;

      document.getElementById("reader-title").textContent = currentStory.title;
      document.getElementById("reader-subtitle").textContent = chapter.title + " — by " + currentStory.author;
      document.getElementById("reader-chapter-label").textContent =
        "Chapter " + (currentChapterIndex + 1) + " of " + total;
      document.getElementById("reader-content").innerHTML = chapter.htmlContent || "<p>No content available.</p>";
      document.getElementById("page-info").textContent =
        (currentChapterIndex + 1) + " / " + total;

      document.getElementById("prev-chapter").disabled = currentChapterIndex === 0;
      document.getElementById("next-chapter").disabled = currentChapterIndex >= total - 1;

      // Scroll to top of reader
      document.getElementById("reader-overlay").scrollTop = 0;
    }

    document.getElementById("reader-close").addEventListener("click", () => {
      document.getElementById("reader-overlay").classList.remove("open");
      document.body.style.overflow = "";
    });

    document.getElementById("prev-chapter").addEventListener("click", () => {
      if (currentChapterIndex > 0) { currentChapterIndex--; renderChapter(); }
    });

    document.getElementById("next-chapter").addEventListener("click", () => {
      if (currentStory && currentChapterIndex < currentStory.chapters.length - 1) {
        currentChapterIndex++; renderChapter();
      }
    });

    // ========================
    // Online/Offline detection
    // ========================
    function updateOnlineStatus() {
      const banner = document.getElementById("offline-banner");
      const toast = document.getElementById("online-toast");

      if (navigator.onLine) {
        banner.style.display = "none";
        toast.classList.add("show");
        // Auto-redirect to main app after a brief delay
        setTimeout(() => { window.location.href = "/offline-stories"; }, 2500);
      } else {
        banner.style.display = "flex";
        toast.classList.remove("show");
      }
    }

    window.addEventListener("online", updateOnlineStatus);
    window.addEventListener("offline", updateOnlineStatus);

    // ========================
    // Init
    // ========================
    document.addEventListener("DOMContentLoaded", () => {
      // If we're actually online, redirect to the real offline-stories page
      if (navigator.onLine) {
        window.location.href = "/offline-stories";
        return;
      }
      renderStories();
    });
  </script>
</body>
</html>
